# =============================================================================
# FONTS - Clock, UI, and slideshow text
# =============================================================================
# Google Fonts at multiple sizes. The 150px clock font uses a minimal glyph set
# for digits; smaller sizes include broader glyphs for setup screens and text.
# Location metadata uses Noto Sans Light because Immich place names can include
# glyphs that Roboto does not provide.
# =============================================================================

