# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC8012P4A1
# =============================================================================
# Base device config: ESP32-P4 host, ESP32-C6 coprocessor (WiFi/BT over SDIO),
# PSRAM, display (MIPI DSI JC8012P4A1), touch (GSL3680), backlight, I2C. Also
# API, logger, web server, OTA, and espframe external components. Display is
# 800×1280 logical (rotation 90).
# =============================================================================

# -----------------------------------------------------------------------------
# Build and log
# -----------------------------------------------------------------------------
substitutions:
  espframe_component_url: "https://github.com/jtenniswood/espframe"
  espframe_component_ref: "main"
  log_level: "INFO"

esp32:
  variant: ESP32P4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_HTTPD_MAX_REQ_HDR_LEN: "8192"
      CONFIG_HTTPD_MAX_URI_LEN: "128"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
    advanced:
      enable_idf_experimental_features: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"
      - "-DLV_USE_BIDI=1"
      - "-DLV_USE_ARABIC_PERSIAN_CHARS=1"

# -----------------------------------------------------------------------------
# ESP32-C6 coprocessor (WiFi and Bluetooth via SDIO)
# -----------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# -----------------------------------------------------------------------------
# PSRAM (hex mode, 200 MHz)
# -----------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# -----------------------------------------------------------------------------
# API, logger, JSON, web server, OTA, debug (reset reason for crash diagnosis)
# -----------------------------------------------------------------------------
api:
  reboot_timeout: 0s

logger:
  level: ${log_level}
  hardware_uart: UART0
  logs:
    component: WARN
    remote_image: WARN
    immich: INFO
    warm: WARN
    accent: WARN

debug:
  update_interval: 60s

text_sensor:
  - platform: debug
    reset_reason:
      id: reset_reason_sensor
      name: "Reset Reason"
      entity_category: diagnostic
      on_value:
        then:
          - if:
              condition:
                lambda: 'return x.find("esphome.ota") != std::string::npos;'
              then:
                - script.execute: firmware_update_recover_display

json:

web_server:
  port: 80
  version: 3
  include_internal: true
  # Keep the control panel on the frame so setup and settings still work if
  # GitHub Pages or the wider internet is unavailable.
  js_url: ""
  css_include: "../../../docs/public/webserver/style.css"
  js_include: "../../../docs/public/webserver/app.js"
  sorting_groups:
    - id: sg_connection
      name: "Connection"
      sorting_weight: 10
    - id: sg_photos
      name: "Photos"
      sorting_weight: 20
    - id: sg_device
      name: "Device"
      sorting_weight: 25
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40
    - id: sg_wifi
      name: "WiFi"
      sorting_weight: 45
    - id: sg_developer
      name: "Developer"
      sorting_weight: 90

ota:
  - platform: esphome
    on_begin:
      then:
        - lambda: |-
            id(firmware_update_reboot_pending) = true;
            global_preferences->sync();

# -----------------------------------------------------------------------------
# External components (espframe: gsl3680, remote_image, espframe)
# -----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espframe_component_url}
      ref: ${espframe_component_ref}
      path: components
    components: [gsl3680, remote_image, espframe]
    refresh: 0s

espframe:
  id: espframe_core

# -----------------------------------------------------------------------------
# DSI PHY power rail, backlight output, I2C
# -----------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

# -----------------------------------------------------------------------------
# MIPI DSI display (JC8012P4A1, 800×1280, rotation 90)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: CUSTOM
    id: tft_display
    reset_pin: GPIO27
    auto_clear_enabled: false
    update_interval: never
    color_order: RGB
    # JC8012P4A1C_I_W_Y panels need the JD9365 sequence because the built-in
    # ESPHome model does not currently apply these vendor registers.
    pclk_frequency: 70MHz
    lane_bit_rate: 1500Mbps
    hsync_pulse_width: 20
    hsync_back_porch: 20
    hsync_front_porch: 40
    vsync_pulse_width: 4
    vsync_back_porch: 10
    vsync_front_porch: 20
    pixel_mode: 16bit
    color_depth: 16
    dimensions:
      width: 800
      height: 1280
