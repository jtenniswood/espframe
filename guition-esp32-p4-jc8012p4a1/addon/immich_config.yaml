# =============================================================================
# IMMICH CONFIGURATION - Runtime-configurable Immich server settings
# =============================================================================
# Exposes Immich URL and API key as text entities in the web server UI.
# Values persist across reboots via NVS flash. Configure via http://<device-ip>/
# =============================================================================

globals:
  - id: immich_fetch_started
    type: bool
    initial_value: 'false'

esphome:
  on_boot:
    priority: -300
    then:
      - lambda: |-
          ESP_LOGI("immich", "Immich config restored from NVS - URL: '%s' (%d chars), API key: %d chars",
                   id(immich_url).state.c_str(), id(immich_url).state.length(),
                   id(immich_api_key_text).state.length());

text:
  - platform: template
    name: "Immich URL"
    id: immich_url
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:web"
    set_action:
      - lambda: |-
          if (x.empty()) {
            ESP_LOGD("immich", "Ignoring empty URL update");
            return;
          }
          id(immich_url).publish_state(x);
          ESP_LOGI("immich", "Immich URL configured: %s", x.c_str());

  - platform: template
    name: "Immich API Key"
    id: immich_api_key_text
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: password
    icon: "mdi:key"
    set_action:
      - lambda: |-
          if (x.empty()) {
            ESP_LOGD("immich", "Ignoring empty API key update");
            return;
          }
          id(immich_api_key_text).publish_state(x);
          ESP_LOGI("immich", "Immich API key configured (%d chars)", x.length());
