# =============================================================================
# DEVELOPMENT FEATURES - opt-in firmware additions
# =============================================================================
# This package is intentionally not included by the normal device package files.
# Add it only from a development build wrapper so in-progress features cannot
# leak into factory firmware or user-installed package builds.
# =============================================================================

esphome:
  platformio_options:
    build_flags:
      - "-DESPFRAME_DEVELOPMENT_FEATURES=1"

text_sensor:
  - platform: template
    name: "Firmware: Development Features"
    id: development_features_sensor
    entity_category: diagnostic
    icon: "mdi:flask-outline"
    web_server:
      sorting_group_id: sg_firmware
    update_interval: never
    lambda: 'return {"enabled"};'
