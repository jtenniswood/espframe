name: PR Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PR checks
        run: npm run check:pr

  compile:
    name: Compile Firmware
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Read product metadata
        run: python3 scripts/product_config.py github-env >> "$GITHUB_ENV"

      - name: Compile 10-inch P4 firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          "${ESPHOME_DOCKER_IMAGE}:${ESPHOME_VERSION}"
          compile /config/builds/guition-esp32-p4-jc8012p4a1.factory.yaml
