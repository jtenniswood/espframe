# =============================================================================
# TAILSCALE POC - Guition ESP32-P4 JC8012P4A1
# =============================================================================
# Local-only proof-of-concept build that adds the MicroLink Tailscale client to
# the 10-inch frame. This is intentionally separate from factory/release builds.
# =============================================================================

substitutions:
  name: "immich-frame-10inch-ts-poc"
  friendly_name: "Immich Frame 10inch Tailscale POC"

packages:
  espframe: !include ../devices/guition-esp32-p4-jc8012p4a1/packages.yaml

external_components:
  - source:
      type: local
      path: ../components
    components: [gsl3680, remote_image, espframe, microlink_client]
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

network:
  enable_ipv6: true

microlink_client:
  id: tailscale_client
  auth_key: !secret tailscale_auth_key
  device_name: ${name}
  max_peers: 8
  h2_buffer_size_kb: 256
  json_buffer_size_kb: 256
  state:
    name: "Tailscale: State"
  ip_address:
    name: "Tailscale: IP Address"
